name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".claude/**"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://learn-api.dreamedtech.com
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Login to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ghcr.io/${{ github.repository }}/backend:latest
            docker pull ghcr.io/${{ github.repository }}/frontend:latest

            # Ensure PASSWORD_ENCRYPTION_KEY exists
            cd /opt/flow-learn
            if ! grep -q "^PASSWORD_ENCRYPTION_KEY=" .env 2>/dev/null; then
              KEY=$(docker run --rm ghcr.io/${{ github.repository }}/backend:latest python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
              echo "PASSWORD_ENCRYPTION_KEY=$KEY" >> .env
              echo "🔑 Generated PASSWORD_ENCRYPTION_KEY"
            fi

            # Update and restart services
            docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f

            echo "✅ Flow Learn deployed at $(date)"
