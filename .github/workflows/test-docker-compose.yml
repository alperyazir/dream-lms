name: Test Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-docker-compose:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      DOMAIN: localhost
      STACK_NAME: flow-learn
      FRONTEND_HOST: http://localhost:5173
      ENVIRONMENT: local
      PROJECT_NAME: "Flow Learn"
      SECRET_KEY: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      DOCKER_IMAGE_BACKEND: backend
      DOCKER_IMAGE_FRONTEND: frontend
      BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:5173"
      SMTP_HOST: ""
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Create .env file
        run: env | grep -E '^(POSTGRES_|DOMAIN|STACK_NAME|FRONTEND_HOST|ENVIRONMENT|PROJECT_NAME|SECRET_KEY|FIRST_SUPERUSER|DOCKER_IMAGE_|BACKEND_CORS|SMTP_|SENTRY_)' > .env
      - name: Verify docker compose config
        run: docker compose config --quiet
      - name: Build all services
        run: docker compose build
      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
