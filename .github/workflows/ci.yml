name: CI
on:
  pull_request:
    branches: [main, development]
  push:
    branches: [development]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.13.0" "black>=25.1.0"
      - run: ruff check app/
      - run: black --check app/ --exclude alembic

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx vite build

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t dream-lms-backend ./backend
      - run: docker build -t dream-lms-frontend ./frontend
