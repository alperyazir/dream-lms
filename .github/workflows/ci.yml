name: CI
on:
  pull_request:
    branches: [main, development]
  push:
    branches: [development]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install "ruff>=0.13.0"
      - run: ruff check app/
      - run: ruff format --check app/ --exclude alembic

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vite build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python dependency audit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install pip-audit
      - run: cd backend && pip-audit -r <(pip install -q uv && uv export --no-hashes 2>/dev/null || echo "") --ignore-vuln PYSEC-2024-* || true
        shell: bash
        continue-on-error: true

      # npm dependency audit
      - run: cd frontend && npm ci && npm audit --audit-level=high || true
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t dream-lms-backend ./backend
      - run: docker build -t dream-lms-frontend ./frontend
