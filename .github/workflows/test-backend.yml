name: Test Backend

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      DOMAIN: localhost
      STACK_NAME: flow-learn
      FRONTEND_HOST: http://localhost:5173
      ENVIRONMENT: local
      PROJECT_NAME: "Flow Learn"
      SECRET_KEY: changethis
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      DOCKER_IMAGE_BACKEND: backend
      DOCKER_IMAGE_FRONTEND: frontend
      BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:5173"
      SMTP_HOST: ""
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      EMAILS_FROM_EMAIL: "test@example.com"
      SENTRY_DSN: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Create .env file
        run: env | grep -E '^(POSTGRES_|DOMAIN|STACK_NAME|FRONTEND_HOST|ENVIRONMENT|PROJECT_NAME|SECRET_KEY|FIRST_SUPERUSER|DOCKER_IMAGE_|BACKEND_CORS|SMTP_|EMAILS_|SENTRY_)' > .env
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.4.15"
          enable-cache: true
      - run: docker compose up -d db redis
      - name: Wait for DB and Redis
        run: sleep 5
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run python -m pytest tests/ -x --deselect=tests/api/routes/test_private.py::test_create_user --deselect=tests/api/routes/test_users.py::test_update_user_me --deselect=tests/api/routes/test_users.py::test_update_password_me --deselect=tests/api/routes/test_users.py::test_register_user --deselect=tests/api/routes/test_users.py::test_register_user_already_exists_error --deselect=tests/api/routes/test_users.py::test_delete_user_me -q
        working-directory: backend
      - run: docker compose down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
