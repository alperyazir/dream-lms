server {
  listen 80;

  # Static assets (JS/CSS/fonts with hash in filename) — long cache, immutable
  location /assets/ {
    root /usr/share/nginx/html;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # index.html — never cache in CDN, short browser cache to pick up new deploys
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # SPA fallback — same no-cache policy (all routes serve index.html)
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
