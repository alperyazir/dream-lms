global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Flow Learn backend metrics
  - job_name: "flow-learn-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "flow-learn"

  # Flow Central Storage API metrics
  - job_name: "flow-central-storage-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          service: "central-storage"

  # Node Exporter (host metrics)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
