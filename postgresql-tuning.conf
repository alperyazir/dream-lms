# PostgreSQL tuning for Dream LMS (4GB+ RAM VPS)
# Include this in your PostgreSQL config or mount as a volume override.
#
# Usage in docker-compose (add to db service):
#   volumes:
#     - ./postgresql-tuning.conf:/etc/postgresql/conf.d/tuning.conf:ro
#   command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
#
# Or apply via ALTER SYSTEM on a running instance:
#   ALTER SYSTEM SET max_connections = 200;
#   ALTER SYSTEM SET shared_buffers = '1GB';
#   SELECT pg_reload_conf();

# Connection limits (4 workers × 25/engine × 2 engines = 200, +20 headroom for admin)
max_connections = 220

# Memory (tuned for 4GB RAM)
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# WAL / Checkpoint
wal_buffers = 64MB
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100
