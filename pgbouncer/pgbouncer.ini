[databases]
* = host=db port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — connections returned to pool after each transaction
pool_mode = transaction
; Skip reset query entirely — prepare_threshold=None in SQLAlchemy means
; no prepared statements exist, so nothing to clean up between transactions
server_reset_query =

; Pool sizing
default_pool_size = 200
min_pool_size = 40
max_client_conn = 1500
reserve_pool_size = 20
reserve_pool_timeout = 3

; Timeouts
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 120
query_wait_timeout = 15

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = postgres
ignore_startup_parameters = extra_float_digits,options
