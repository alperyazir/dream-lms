# docker-compose.prod.yml — Production deployment for Flow Learn
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:17
    restart: unless-stopped
    command: >
      postgres
        -c max_connections=220
        -c statement_timeout=30000
        -c idle_in_transaction_session_timeout=300000
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
      - ./postgresql-tuning.conf:/etc/postgresql/tuning.conf:ro
      - ./backups:/backups
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: /entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --port 6380
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      retries: 5
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-dream-lms-backend}:${TAG:-latest}
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=pgbouncer
      - POSTGRES_PORT=6432
      - REDIS_URL=redis://redis:6380/0
      - RATE_LIMIT_REDIS_URL=redis://redis:6380/1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.dream-lms-backend.loadbalancer.server.port=8000
      - traefik.http.routers.dream-lms-backend-https.rule=Host(`api.${DOMAIN}`) && (PathPrefix(`/api/v1`) || PathPrefix(`/static`))
      - traefik.http.routers.dream-lms-backend-https.entrypoints=https
      - traefik.http.routers.dream-lms-backend-https.tls=true
      - traefik.http.routers.dream-lms-backend-https.tls.certresolver=le

  arq-worker:
    image: ${DOCKER_IMAGE_BACKEND:-dream-lms-backend}:${TAG:-latest}
    build:
      context: ./backend
    command: arq app.worker.WorkerSettings
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - POSTGRES_SERVER=pgbouncer
      - POSTGRES_PORT=6432
      - REDIS_URL=redis://redis:6380/0
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-dream-lms-frontend}:${TAG:-latest}
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.${DOMAIN}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.dream-lms-frontend.loadbalancer.server.port=80
      - traefik.http.routers.dream-lms-frontend-https.rule=Host(`dashboard.${DOMAIN}`)
      - traefik.http.routers.dream-lms-frontend-https.entrypoints=https
      - traefik.http.routers.dream-lms-frontend-https.tls=true
      - traefik.http.routers.dream-lms-frontend-https.tls.certresolver=le

volumes:
  db-data:
  redis-data:

networks:
  traefik-public:
    external: true
