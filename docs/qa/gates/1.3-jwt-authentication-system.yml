    finding: "Refresh token not rotated on /refresh endpoint"
    impact: "If refresh token is compromised, attacker has long-lived access (7 days)"
    suggested_action: "Implement refresh token rotation - issue new refresh token on each /refresh call and blacklist old one"
    suggested_owner: dev
    refs: ["app/routers/auth.py:96-145"]
    status: "future_enhancement"
    notes: "Not a production blocker - current implementation is secure, rotation adds defense-in-depth"

  - id: "TECH-001"
    severity: low
    finding: "In-memory token blacklist resets on server restart"
    impact: "Logged-out users can reuse tokens after server restart until natural expiration"
    suggested_action: "Document as known limitation for MVP. Migrate to Redis for production deployments."
    suggested_owner: dev
    refs: ["app/services/auth_service.py:17-19"]
    status: "documented"
    notes: "Acceptable for MVP single-instance deployment"

